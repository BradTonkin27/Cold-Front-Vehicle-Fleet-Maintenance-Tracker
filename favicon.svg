<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#2d2d2d" rx="60"/>

  <!-- Van body -->
  <rect x="60" y="175" width="392" height="140" rx="8" fill="#ffffff"/>

  <!-- Cab roof -->
  <path d="M60 175 Q62 135 88 126 L236 122 Q258 122 264 138 L268 175 Z" fill="#ffffff"/>

  <!-- Windscreen -->
  <path d="M76 173 Q78 142 96 134 L230 130 Q250 130 255 145 L258 173 Z" fill="#2d2d2d" opacity="0.82"/>

  <!-- Side windows -->
  <rect x="278" y="190" width="55" height="38" rx="3" fill="#2d2d2d" opacity="0.55"/>
  <rect x="342" y="190" width="55" height="38" rx="3" fill="#2d2d2d" opacity="0.55"/>

  <!-- Door line -->
  <line x1="272" y1="175" x2="272" y2="315" stroke="#2d2d2d" stroke-width="2.5" opacity="0.18"/>

  <!-- Headlight -->
  <rect x="54" y="228" width="14" height="22" rx="3" fill="#ffffcc" opacity="0.95"/>

  <!-- Grille -->
  <rect x="54" y="196" width="14" height="28" rx="2" fill="#aaaaaa"/>
  <line x1="54" y1="203" x2="68" y2="203" stroke="#888" stroke-width="1.2"/>
  <line x1="54" y1="210" x2="68" y2="210" stroke="#888" stroke-width="1.2"/>
  <line x1="54" y1="217" x2="68" y2="217" stroke="#888" stroke-width="1.2"/>

  <!-- Bull bar -->
  <rect x="48" y="192" width="10" height="82" rx="2" fill="#bbbbbb"/>

  <!-- Tail lights -->
  <rect x="450" y="192" width="10" height="24" rx="2" fill="#ff5555" opacity="0.9"/>
  <rect x="450" y="222" width="10" height="16" rx="2" fill="#ffaa44" opacity="0.85"/>

  <!-- Chassis -->
  <rect x="60" y="307" width="392" height="12" rx="2" fill="#cccccc"/>

  <!-- Front wheel -->
  <ellipse cx="158" cy="323" rx="42" ry="42" fill="#2d2d2d"/>
  <ellipse cx="158" cy="323" rx="34" ry="34" fill="#777777"/>
  <ellipse cx="158" cy="323" rx="22" ry="22" fill="#cccccc"/>
  <ellipse cx="158" cy="323" rx="10" ry="10" fill="#2d2d2d"/>

  <!-- Rear wheel -->
  <ellipse cx="374" cy="323" rx="42" ry="42" fill="#2d2d2d"/>
  <ellipse cx="374" cy="323" rx="34" ry="34" fill="#777777"/>
  <ellipse cx="374" cy="323" rx="22" ry="22" fill="#cccccc"/>
  <ellipse cx="374" cy="323" rx="10" ry="10" fill="#2d2d2d"/>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="366" rx="165" ry="8" fill="#000000" opacity="0.18"/>

  <!-- COLD FRONT text -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="52" font-weight="700"
    letter-spacing="6" text-anchor="middle" fill="#ffffff">COLD FRONT</text>

  <!-- Tagline -->
  <text x="256" y="468" font-family="Arial, sans-serif" font-size="18" font-weight="400"
    letter-spacing="5" text-anchor="middle" fill="#ffffff" opacity="0.45">FLEET TRACKER</text>
</svg>
